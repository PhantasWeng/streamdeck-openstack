<!DOCTYPE html>
<html>

<head lang="en">
  <title>Instance Metric Settings</title>
  <meta charset="utf-8" />
  <script src="libs/sdpi-components.js"></script>
</head>

<body>
  <!-- ── Connection settings (global settings, manually get/set via lifecycle in openstack-global.js) ── -->
  <div id="openstack-connection"></div>

  <hr />

  <!-- ── This button's target (stored in action settings, keeping sdpi-components auto-binding) ── -->
  <sdpi-item label="Instance ID">
    <sdpi-textfield setting="serverId" placeholder="instance (server) UUID"></sdpi-textfield>
  </sdpi-item>
  <sdpi-item label="Metric">
    <sdpi-select setting="metric" default="cpu_percent">
      <option value="cpu_percent">CPU Usage (%)</option>
      <option value="mem_percent">Memory Usage (%)</option>
      <option value="mem_usage">Memory Used (GB)</option>
      <option value="vcpus">vCPUs</option>
      <option value="disk">Disk (GB)</option>
      <option value="disk_io">Disk I/O (MB/s)</option>
      <option value="net_io">Network I/O (MB/s)</option>
    </sdpi-select>
  </sdpi-item>
  <!-- Disk / Disk I/O metrics only: pick a single disk or all of them; options come from the plugin (datasource).
       The row is only visible while Metric = Disk or Disk I/O (toggled by the script below). -->
  <sdpi-item label="Disk" id="disk-row" style="display: none;">
    <sdpi-select setting="diskSelection" default="all" datasource="getDisks" show-refresh loading="Loading disks…"></sdpi-select>
  </sdpi-item>
  <!-- Layout: only meaningful for metrics that provide a history series (CPU% / Memory% / Memory GB);
       hidden for the others, which are always shown as a number. Toggled by the script below. -->
  <sdpi-item label="Layout" id="display-row" style="display: none;">
    <sdpi-select setting="displayStyle" default="chart">
      <option value="chart">Trend chart</option>
      <option value="combo">Value + mini chart</option>
      <option value="number">Value only</option>
    </sdpi-select>
  </sdpi-item>
  <sdpi-item label="Display Name">
    <sdpi-textfield setting="displayName" placeholder="Leave empty to use the metric name"></sdpi-textfield>
  </sdpi-item>
  <sdpi-item label="Update Interval (seconds)">
    <sdpi-textfield setting="pollingSeconds" type="number" min="15" placeholder="60" default="60"></sdpi-textfield>
  </sdpi-item>

  <script src="libs/openstack-global.js"></script>
  <script>
    // Show metric-specific rows: the Disk picker (Disk / Disk I/O) and the Layout picker
    // (only metrics that have a history series: CPU% / Memory% / Memory GB).
    (() => {
      const diskRow = document.getElementById("disk-row");
      const displayRow = document.getElementById("display-row");
      const metricEl = document.querySelector('sdpi-select[setting="metric"]');
      const CHART_METRICS = ["cpu_percent", "mem_percent", "mem_usage", "disk_io", "net_io"];
      const toggle = (value) => {
        diskRow.style.display = value === "disk" || value === "disk_io" ? "" : "none";
        displayRow.style.display = CHART_METRICS.includes(value) ? "" : "none";
      };
      // React to user changes in this PI
      metricEl.addEventListener("valuechange", () => toggle(metricEl.value));
      // Initial state from the persisted settings
      const client = window.SDPIComponents && window.SDPIComponents.streamDeckClient;
      if (client) {
        client
          .getSettings()
          .then((payload) => toggle((payload && payload.settings && payload.settings.metric) || "cpu_percent"))
          .catch(() => {});
      }
    })();
  </script>
</body>

</html>
